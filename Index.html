<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Toolkit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>School Toolkit</h1>
    <p>Your all‑in‑one student dashboard</p>
</header>

<nav>
    <button onclick="showSection('tasks')">Homework</button>
    <button onclick="showSection('schedule')">Schedule</button>
    <button onclick="showSection('grades')">Grade Calc</button>
    <button onclick="showSection('timer')">Study Timer</button>
    <button onclick="showSection('notes')">Notes</button>
</nav>

<main>

    <!-- HOMEWORK -->
    <section id="tasks" class="section active">
        <h2>Homework Planner</h2>
        <div class="row">
            <input id="taskInput" placeholder="Add homework...">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
    </section>

    <!-- SCHEDULE -->
    <section id="schedule" class="section">
        <h2>Class Schedule</h2>
        <textarea id="scheduleBox" placeholder="Enter your class schedule..."></textarea>
    </section>

    <!-- GRADE CALCULATOR -->
    <section id="grades" class="section">
        <h2>Grade Calculator</h2>
        <div class="row">
            <input id="gradeEarned" type="number" placeholder="Score">
            <input id="gradeTotal" type="number" placeholder="Total">
            <button onclick="calcGrade()">Calc</button>
        </div>
        <p id="gradeResult"></p>
    </section>

    <!-- STUDY TIMER -->
    <section id="timer" class="section">
        <h2>Study Timer</h2>
        <p id="timerDisplay">25:00</p>
        <button onclick="startTimer()">Start</button>
        <button onclick="resetTimer()">Reset</button>
    </section>

    <!-- NOTES -->
    <section id="notes" class="section">
        <h2>Notes</h2>
        <textarea id="notesBox" placeholder="Write notes here..."></textarea>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
