<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC School Toolkit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>JC School Toolkit</h1>
        <p class="subtitle">Quick tools for school, productivity, and utilities</p>
    </header>

    <main id="tool-container">

        <!-- Tool: GPA Calculator -->
        <section class="tool">
            <h2>GPA Calculator</h2>
            <input type="number" id="gpa-input" placeholder="Enter grade (0–100)">
            <button onclick="calcGPA()">Convert</button>
            <p id="gpa-output"></p>
        </section>

        <!-- Tool: Random Password Generator -->
        <section class="tool">
            <h2>Password Generator</h2>
            <button onclick="generatePassword()">Generate</button>
            <p id="password-output"></p>
        </section>

        <!-- Tool: Quick Notes -->
        <section class="tool">
            <h2>Quick Notes</h2>
            <textarea id="notes-box" placeholder="Write notes here..."></textarea>
            <button onclick="saveNotes()">Save</button>
            <p id="notes-status"></p>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
